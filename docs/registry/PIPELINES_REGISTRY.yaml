# O6 Registry v1 — PIPELINES_REGISTRY
# Cadeias de agentes/etapas que compõem um fluxo de negócio ponta a
# ponta. Uma "pipeline" aqui pode ser: (a) uma orquestração real de
# múltiplas rotas chamando umas às outras, (b) um fluxo manual seguido
# por humano + Claude Code, ou (c) apenas planejado. Ver seção "Agent
# Swarm Architecture" em CLAUDE.md para o diagrama completo de
# orquestração via Supabase (sem fila/webhook entre rotas O6).

updated_at: "2026-07-06"
version: 1

pipelines:
