    name: "Intelligence Pipeline"
    status: developing
    steps:
      - "Apify Google Maps scan (app/api/apify-search, implementado)"
      - "Scoring de oportunidade (VPS cron, /opt/o6-intelligence/main.py, implementado)"
      - "offer_book_mini quando score >= 80 (implementado no código, testado só por simulação manual — não acionado por dado real ainda)"
    notes: "Core funcional; a extensão mais nova não teve acionamento real confirmado."

