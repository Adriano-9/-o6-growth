# ─────────────────────────────────────────────────────────────────────────────
# HANDOFF MATRIX
# ─────────────────────────────────────────────────────────────────────────────

handoffs:
  research-chief:
    routes_to: [sackett, booth, creswell, forsgren, cochrane, higgins, klein, gilad, ioannidis, kahneman]

  # Tier 0 — sequential chain
  sackett:
    hands_off_to: [booth]
    escalates_to: [research-chief]

  booth:
    receives_from: [sackett]
    hands_off_to: [creswell]
    escalates_to: [research-chief]

  creswell:
    receives_from: [booth]
    hands_off_to: [research-chief]
    escalates_to: [research-chief]

  # Tier 1 — parallel, return to orchestrator
  forsgren:
    collaborates_with: [cochrane]
    returns_to: [research-chief]

  cochrane:
    collaborates_with: [forsgren, higgins]
    returns_to: [research-chief]

  higgins:
    collaborates_with: [cochrane, gilad]
    returns_to: [research-chief]

  klein:
    collaborates_with: [gilad, forsgren]
    returns_to: [research-chief]

  gilad:
    collaborates_with: [higgins, klein]
    returns_to: [research-chief]

  # QA — sequential, final
  ioannidis:
    receives_from: [research-chief]
    hands_off_to: [kahneman]

  kahneman:
    receives_from: [ioannidis]
    hands_off_to: [research-chief]

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE FLOW
# ─────────────────────────────────────────────────────────────────────────────

pipeline:
  description: |
    Every research query follows this pipeline:
    1. research-chief classifies query into use cases (UC-001~004)
    2. Tier 0 runs sequentially: Sackett → Booth → Creswell
    3. Tier 1 runs in parallel: selected agents based on use case
    4. QA runs sequentially: Ioannidis → Kahneman
    5. research-chief synthesizes final report

  use_cases:
    UC-001:
      label: "Technical Deep Dive"
      primary_agents: [forsgren, cochrane]
      secondary_agents: [klein, higgins]

    UC-002:
      label: "Strategic Decision Support"
      primary_agents: [klein, gilad]
      secondary_agents: [forsgren, cochrane]

    UC-003:
      label: "Competitive Intelligence"
      primary_agents: [gilad, higgins]
      secondary_agents: [klein]

    UC-004:
      label: "Evidence Synthesis"
      primary_agents: [cochrane, forsgren]
      secondary_agents: [higgins]

# ─────────────────────────────────────────────────────────────────────────────
# QUALITY GATES
# ─────────────────────────────────────────────────────────────────────────────

quality_gates:
  QG-001:
    name: "Question Quality"
    agent: sackett
    placement: "After Tier 0"
    criteria: "PICO question is well-formed with all 4 components"

  QG-002:
    name: "Methodology Fit"
    agent: booth
    placement: "After Tier 0"
    criteria: "Review type matches question type and available evidence"

  QG-003:
    name: "Evidence Reliability"
    agent: ioannidis
    placement: "After Tier 1"
    criteria: "PPV > threshold, bias patterns flagged, unreliable evidence identified"

  QG-004:
    name: "Decision Quality"
    agent: kahneman
    placement: "Final"
    criteria: "12-Question Checklist passed, cognitive biases audited, pre-mortem completed"

