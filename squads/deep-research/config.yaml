pack:
  name: deep-research
  version: "1.0.1"
  description: >-
    Squad de pesquisa profunda com pipeline 3-tier: Diagnostic (Tier 0),
    Execution (Tier 1), e Quality Assurance. 11 agents especializados baseados
    em elite minds reais.
  icon: "🔬"

entry_agent: research-chief
tested: false
tested_scope:
  status: structural_deep_validation_only
  reason: "Validação profunda local não executa pesquisa web real nem chamadas externas; valida estrutura, contratos, YAML e scripts TypeScript quando possível."

squad:
  name: deep-research
  display_name: "Deep Research Squad"
  version: "1.0.1"
  domain: "Evidence-Based Research Pipeline"
  description: |
    Squad de pesquisa profunda com pipeline 3-tier: Diagnostic (Tier 0),
    Execution (Tier 1), e Quality Assurance. 11 agents especializados baseados
    em elite minds reais — de Evidence-Based Medicine (Sackett) a Competitive
    Intelligence (Gilad), com QA obrigatório (Ioannidis + Kahneman).

  philosophy: |
    "Every research question deserves a structured, evidence-based answer."
    O pipeline garante que toda query passa por diagnóstico (formular a pergunta
    certa), execução (reunir evidência), e QA (auditar vieses e qualidade).

  keywords:
    - deep-research
    - evidence-based
    - systematic-review
    - competitive-intelligence
    - osint
    - decision-science
    - bias-detection
    - pico
    - dora-metrics
    - sensemaking

  entry_agent: research-chief
  created_by: "squad-creator-pro"
  created_at: "2026-02-07"
  tested: false

workspace_integration:
  level: none
  rationale: >-
    O deep-research squad e self-contained. Nao consome nem produz artefatos
    no workspace/. Toda operacao acontece dentro do pipeline de pesquisa.

# ─────────────────────────────────────────────────────────────────────────────
# TIER ARCHITECTURE
# ─────────────────────────────────────────────────────────────────────────────

tiers:
  tier_0:
    name: "Diagnostic"
    agents:
      - sackett
      - booth
      - creswell
    purpose: "Formulate the research question, select methodology, and design the research plan. Always runs first, sequentially."

  tier_1:
    name: "Execution"
    agents:
      - forsgren
      - cochrane
      - higgins
      - klein
      - gilad
    purpose: "Deep specialist analysis. Runs in parallel — orchestrator selects relevant agents based on use case classification."

  qa:
    name: "Quality Assurance"
    agents:
      - ioannidis
      - kahneman
    purpose: "Mandatory QA gate. Ioannidis audits evidence reliability (PPV, bias). Kahneman audits decision quality (cognitive biases). Always runs last, sequentially."

  orchestrator:
    name: "Pipeline Coordinator"
    agents:
      - research-chief
    purpose: "Classify queries, route through pipeline, enforce quality gates, synthesize final report."

